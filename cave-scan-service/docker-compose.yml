services:
  cave-scan:
    build: .
    container_name: cave-scan
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      OLLAMA_URL:    "http://host.docker.internal:11434"
      SEARXNG_URL:   "http://host.docker.internal:8888"
      OLLAMA_MODEL:  "qwen3-vl:8b"
      CAVE_BASE_DIR: "/data/cave"
      SETTLE_DELAY:  "3.0"
    volumes:
      - ../data/inbox:/data/cave
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
