version: "3.9"

services:
  cave-scan:
    build: .
    container_name: cave-scan
    restart: unless-stopped
    environment:
      OLLAMA_URL:    "http://100.86.15.25:11434"
      SEARXNG_URL:   "http://100.86.15.25:8888"
      OLLAMA_MODEL:  "qwen3-vl:8b"
      CAVE_BASE_DIR: "/data/cave"
      SETTLE_DELAY:  "3.0"
    volumes:
      - /volume1/docker/cavino/data/inbox:/data/cave
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
