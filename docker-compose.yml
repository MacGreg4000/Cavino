services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: cavemanager
      POSTGRES_USER: cave
      POSTGRES_PASSWORD: ${DB_PASSWORD:-caveau2024}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cave"]
      interval: 10s
      timeout: 5s
      retries: 5

  cave-api:
    build: ./api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://cave:${DB_PASSWORD:-caveau2024}@postgres:5432/cavemanager
      INBOX_PATH: /inbox
      PROCESSED_PATH: /processed
      ERRORS_PATH: /errors
      PHOTOS_PATH: /photos
      OLLAMA_URL: ${OLLAMA_URL:-http://macciolupo.tplinkdns.com:11434}
      PORT: 3010
      JWT_SECRET: ${JWT_SECRET:-caveau_jwt_secret_change_me}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
      # Inbox (NAS / Docker volume) : polling + scan périodique si le watcher rate des fichiers
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-true}
      CHOKIDAR_INTERVAL_MS: ${CHOKIDAR_INTERVAL_MS:-5000}
      INBOX_PERIODIC_SCAN_MS: ${INBOX_PERIODIC_SCAN_MS:-60000}
    volumes:
      - ./data/inbox:/inbox
      - ./data/processed:/processed
      - ./data/errors:/errors
      - wine_photos:/photos
    ports:
      - "${API_PORT:-3010}:3010"

  cave-app:
    build:
      context: ./app
      args:
        VITE_PUBLIC_BASE_URL: ${VITE_PUBLIC_BASE_URL:-}
    restart: unless-stopped
    depends_on:
      - cave-api
    ports:
      - "${APP_PORT:-3011}:80"

  cave-backup:
    image: postgres:16-alpine
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_DB: cavemanager
      POSTGRES_USER: cave
      PGPASSWORD: ${DB_PASSWORD:-caveau2024}
    volumes:
      - cave_backups:/backups
      - ./backup.sh:/backup.sh:ro
    entrypoint: >
      sh -c "while true; do
               POSTGRES_USER=cave POSTGRES_DB=cavemanager sh /backup.sh;
               sleep ${BACKUP_INTERVAL:-86400};
             done"

volumes:
  postgres_data:
  wine_photos:
  cave_backups:
