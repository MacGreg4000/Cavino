services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: cavemanager
      POSTGRES_USER: cave
      POSTGRES_PASSWORD: ${DB_PASSWORD:-caveau2024}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cave"]
      interval: 10s
      timeout: 5s
      retries: 5

  cave-api:
    build: ./api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://cave:${DB_PASSWORD:-caveau2024}@postgres:5432/cavemanager
      INBOX_PATH: /inbox
      PROCESSED_PATH: /processed
      ERRORS_PATH: /errors
      PHOTOS_PATH: /photos
      OLLAMA_URL: ${OLLAMA_URL:-http://macciolupo.tplinkdns.com:11434}
      PORT: 3001
    volumes:
      - ${CAVE_DATA:-/volume1/cave-manager}/inbox:/inbox
      - ${CAVE_DATA:-/volume1/cave-manager}/processed:/processed
      - ${CAVE_DATA:-/volume1/cave-manager}/errors:/errors
      - wine_photos:/photos
    ports:
      - "3001:3001"

  cave-app:
    build: ./app
    restart: unless-stopped
    depends_on:
      - cave-api
    ports:
      - "3000:80"

volumes:
  postgres_data:
  wine_photos:
